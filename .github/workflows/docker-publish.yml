name: 🐳 Publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git branch, tag, or SHA to build'
        required: true
        default: 'main'
      docker_tag:
        description: 'Docker Hub tag to push (e.g. latest, 0.9.0)'
        required: true
        default: 'latest'

env:
  IMAGE: bgeoopengis/giswater-api

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.ref }}

      - name: Set Docker image tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          MANUAL_TAG: ${{ inputs.docker_tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="${MANUAL_TAG#v}"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
