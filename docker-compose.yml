services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # Per-tenant config (rw — admin CRUD writes tenant .env files here)
      - ./config:/app/config
    extra_hosts:
      - "host.containers.internal:host-gateway"
    networks:
      api-network:
        ipv4_address: 172.21.1.50

  # ---------------------------------------------------------------------------
  # Optional dev convenience: native subdomain routing locally via Traefik.
  # Add `127.0.0.1 acme.bgeo360.localhost` to /etc/hosts (or use *.localhost
  # which most resolvers map to 127.0.0.1) and visit
  # http://acme.bgeo360.localhost/gw-api/v1/...
  # ---------------------------------------------------------------------------
  # traefik:
  #   image: traefik:v3
  #   command:
  #     - --providers.docker=true
  #     - --providers.docker.exposedbydefault=false
  #     - --entrypoints.web.address=:80
  #   ports:
  #     - "80:80"
  #     - "8080:8080"  # dashboard
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   networks: [api-network]
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.gw.rule=HostRegexp(`{tenant:[a-z0-9-]+}.bgeo360.localhost`)"
  #     - "traefik.http.routers.gw.entrypoints=web"
  #     - "traefik.http.services.gw.loadbalancer.server.port=8000"

networks:
  api-network:
    ipam:
      config:
        - subnet: 172.21.1.0/24
