# Portable across:
#   - Fedora/RHEL + rootless podman (SELinux enforcing)
#   - Windows / macOS + Docker Desktop
#   - Debian/Ubuntu + Docker (production)
#
# `:Z` is an SELinux relabel hint. Podman/CRI-O honor it; Docker silently
# ignores it on non-SELinux hosts, so it is portable.
#
# For dev hot-reload of code, use docker-compose.override.yml (gitignored)
# to also bind-mount `.:/app`. The base file ships only the mounts the
# app actually needs at runtime: tenant config on host + logs in named volume.

services:
  app:
    build: .
    image: giswater-api:latest
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config:/app/config:Z
      - giswater_api_logs:/app/logs
    extra_hosts:
      # Dev only: lets the container reach Postgres on the host.
      # Docker Desktop already supports host.docker.internal natively.
      - "host.containers.internal:host-gateway"
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      # Uses API_ROOT from .env (default /giswater); override in compose env if you change API_ROOT.
      test: ["CMD", "python", "-c", "import os,urllib.request,sys; root=(os.environ.get('API_ROOT') or '/giswater').rstrip('/'); sys.exit(0 if urllib.request.urlopen(f'http://127.0.0.1:8000{root}/health', timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      api-network:
        ipv4_address: 172.21.1.50

networks:
  api-network:
    ipam:
      config:
        - subnet: 172.21.1.0/24

volumes:
  giswater_api_logs:
