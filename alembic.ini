# Alembic configuration for the API-owned `gwapi` schema.
#
# The application configures Alembic programmatically (see app/db/migrate.py),
# so the `sqlalchemy.url` below is only used when running the `alembic` CLI
# directly during development. Migrations are raw SQL (no ORM models).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Dev-only fallback URL; production/runtime URLs are injected per tenant.
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/postgres

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
